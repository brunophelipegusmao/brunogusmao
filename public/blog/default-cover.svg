<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Capa padrão do blog</title>
  <desc id="desc">Composição editorial brutalista em tons de azul para artigos sem capa definida.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f9ff" />
      <stop offset="100%" stop-color="#d8e5ff" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f5fd0" />
      <stop offset="100%" stop-color="#15306d" />
    </linearGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M 72 0 L 0 0 0 72" fill="none" stroke="#9bb4e5" stroke-width="1" opacity="0.45" />
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#grid)" />

  <rect x="96" y="96" width="24" height="708" fill="#2f5fd0" />
  <rect x="144" y="132" width="520" height="2" fill="#2f5fd0" opacity="0.75" />
  <rect x="144" y="760" width="320" height="2" fill="#2f5fd0" opacity="0.55" />

  <rect x="888" y="124" width="556" height="300" fill="#eef4ff" stroke="#6b8edb" stroke-width="2" />
  <rect x="1012" y="468" width="432" height="228" fill="#d7e5ff" stroke="#2f5fd0" stroke-width="2" />

  <text x="146" y="356" fill="#0f1b36" font-family="Goldman, Arial, sans-serif" font-size="138" letter-spacing="-4">NOVO</text>
  <text x="146" y="472" fill="#0f1b36" font-family="Goldman, Arial, sans-serif" font-size="138" letter-spacing="-4">POST</text>

  <text x="148" y="626" fill="#2f5fd0" font-family="monospace" font-size="26" letter-spacing="8">BRUNO GUSMAO / BLOG</text>
  <circle cx="1316" cy="248" r="84" fill="url(#accent)" opacity="0.92" />
  <circle cx="1210" cy="586" r="42" fill="#2f5fd0" opacity="0.88" />
</svg>